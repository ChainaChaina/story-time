<div class="login-container">

  <img src="./assets/logo.svg" alt="">
  <h2>Login</h2>
  <form class="PrincipalLogin" id="Login" #f="ngForm">
  <div class="form-group">
    <label for="username">Nome de Usuário:</label>
    <input
      style="border-radius: 5px; border: 2px solid black;"
      type="text"
      id="username"
      name="username"
      [(ngModel)]="userName"
      required
    />
  </div>
  <div class="form-group">
    <label for="password">Senha:</label>
    <input
      style="border-radius: 5px; border: 2px solid black;"
      type="password"
      id="password"
      name="password"
      [(ngModel)]="password"
      required
    />
  </div>
  <button (click)="authenticate()" href="/" type="submit">Entrar</button>
</form>
</div>
